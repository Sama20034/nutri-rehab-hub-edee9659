    /* Critical CSS for preventing layout shift */
    html, body {
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      width: 100%;
    }
    
    /* Safe areas for notched devices */
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }
  </style>
  <!-- Route persistence for mobile refresh -->
  <script>
    (function() {
      var STORAGE_KEY = 'alligator_current_route';
      var currentHash = window.location.hash;
      var savedRoute = localStorage.getItem(STORAGE_KEY);
      
      // Function to check if hash is empty/home
      function isEmptyHash(hash) {
        return !hash || hash === '' || hash === '#' || hash === '#/' || hash === '#';
      }
      
      // Function to save route
      function saveRoute(hash) {
        if (!isEmptyHash(hash)) {
          localStorage.setItem(STORAGE_KEY, hash);
        }
      }
      
      // On page load: restore route if current hash is empty but we have saved route
      if (isEmptyHash(currentHash) && savedRoute && !isEmptyHash(savedRoute)) {
        // Use replace to avoid adding to history
        window.location.replace(window.location.pathname + window.location.search + savedRoute);
      } else if (!isEmptyHash(currentHash)) {
        // Save current route if it's valid
        saveRoute(currentHash);
      }
      
      // Listen for hash changes and save them
      window.addEventListener('hashchange', function() {
        saveRoute(window.location.hash);
      });
      
      // Also save on beforeunload to catch any last-moment changes
      window.addEventListener('beforeunload', function() {
        saveRoute(window.location.hash);
      });
      
      // For SPA navigation, also monitor popstate
      window.addEventListener('popstate', function() {
        setTimeout(function() {
          saveRoute(window.location.hash);
        }, 100);
      });
    })();
  </script>
